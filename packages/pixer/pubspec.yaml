name: pixer
description: High-performance Dart image manipulation backed by Rust FFI for resizing, cropping, encoding, and thumbnail generation in apps and tools.
version: 0.0.8
resolution: workspace
repository: https://github.com/hawkkiller/pixer

environment:
  sdk: ^3.10.7

dependencies:
  code_assets: ^1.0.0
  ffi: ^2.1.4
  hooks: ^1.0.0
  crypto: ^3.0.7
  native_toolchain_rust: ^1.0.4

dev_dependencies:
  ffigen: ^20.1.1
  lints: ^6.0.0
  test: ^1.25.6
